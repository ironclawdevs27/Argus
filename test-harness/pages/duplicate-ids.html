<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Duplicate id fixture for Argus D6.8 detection">
  <title>Duplicate ID Fixture — Argus D6.8</title>
</head>
<body>
  <h1>Duplicate ID Fixture</h1>
  <p>This page has elements sharing the same <code>id</code> attribute, which violates the HTML spec.</p>

  <!-- "card" used on 3 elements -->
  <div id="card">Card One</div>
  <div id="card">Card Two</div>
  <div id="card">Card Three</div>

  <!-- "header" used on 2 elements -->
  <section id="header">Header Section A</section>
  <section id="header">Header Section B</section>

  <!-- "unique-id" used only once — must NOT be flagged -->
  <p id="unique-id">This id is unique and should not trigger a warning.</p>

  <div id="fixture-ready" data-ready="true">ready</div>
</body>
</html>
